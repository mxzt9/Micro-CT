<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopologyAdaptiveRoutedUNet3D — интерактивная схема</title>
<style>
  :root{
    --bg:#0b0e14; --panel:#11151f; --panel2:#161b28; --line:#232a3a;
    --txt:#c8d0e0; --dim:#7d8799; --bright:#eef2fa;
    --enc:#4ea1ff; --dec:#3ddc97; --ctx:#ffb454; --head:#c792ea; --loss:#ff6b6b; --io:#8b95a8;
    --mono:"JetBrains Mono","SF Mono","Cascadia Code",Consolas,monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{background:var(--bg); color:var(--txt); font-family:var(--mono); font-size:13px; overflow:hidden;}
  .topbar{height:58px; display:flex; align-items:center; gap:24px; padding:0 20px; border-bottom:1px solid var(--line); background:var(--panel);}
  .topbar h1{font-size:15px; color:var(--bright); font-weight:600; letter-spacing:.4px;}
  .topbar h1 .tag{color:var(--ctx); font-weight:400;}
  .nsel{display:flex; align-items:center; gap:8px; margin-left:auto;}
  .nsel span{color:var(--dim); font-size:11px;}
  .nsel button{background:var(--panel2); color:var(--txt); border:1px solid var(--line); padding:4px 10px; cursor:pointer; font-family:var(--mono); font-size:12px; border-radius:4px;}
  .nsel button.on{background:var(--ctx); color:#1a1205; border-color:var(--ctx); font-weight:700;}
  .legend{display:flex; gap:14px; font-size:11px; color:var(--dim);}
  .legend i{display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:5px; vertical-align:-1px;}
  .wrap{display:flex; height:calc(100% - 58px);}
  .canvas-outer{flex:1; overflow:auto; position:relative;}
  .canvas{position:relative; width:1230px; height:960px; margin:0 auto;}
  svg.edges{position:absolute; inset:0; width:100%; height:100%; pointer-events:none;}
  svg.edges path{fill:none; stroke-width:1.4; stroke-opacity:.38; transition:stroke-opacity .15s, stroke-width .15s;}
  svg.edges path.hl{stroke-opacity:1; stroke-width:2.6;}
  svg.edges path.dm{stroke-opacity:.10;}
  .node{position:absolute; background:var(--panel2); border:1px solid var(--line); border-left:3px solid var(--io);
        border-radius:6px; padding:7px 10px; cursor:pointer; user-select:none; transition:all .15s; z-index:2;}
  .node:hover{border-color:#3a4458; transform:translateY(-1px);}
  .node .nm{color:var(--bright); font-size:12px; font-weight:600; white-space:nowrap;}
  .node .sh{color:var(--dim); font-size:10.5px; margin-top:2px; white-space:nowrap;}
  .node.g-enc{border-left-color:var(--enc);} .node.g-dec{border-left-color:var(--dec);}
  .node.g-ctx{border-left-color:var(--ctx);} .node.g-head{border-left-color:var(--head);}
  .node.g-loss{border-left-color:var(--loss);} .node.g-io{border-left-color:var(--io);}
  .node.sel{box-shadow:0 0 0 1.5px var(--bright), 0 6px 24px rgba(0,0,0,.6); z-index:3;}
  .node.dm{opacity:.35;}
  .panel{width:480px; min-width:480px; border-left:1px solid var(--line); background:var(--panel); overflow-y:auto; padding:22px 24px 60px;}
  .panel h2{font-size:16px; color:var(--bright); margin-bottom:2px;}
  .panel .cls{color:var(--ctx); font-size:11px; margin-bottom:14px;}
  .panel h3{font-size:11px; text-transform:uppercase; letter-spacing:1.2px; color:var(--dim); margin:18px 0 8px; border-bottom:1px solid var(--line); padding-bottom:4px;}
  .panel p{font-size:12.5px; line-height:1.65; margin-bottom:8px;}
  .panel ul{margin:0 0 8px 16px;} .panel li{font-size:12.5px; line-height:1.65; margin-bottom:4px;}
  .panel code{background:#0d1119; border:1px solid var(--line); padding:1px 5px; border-radius:3px; font-size:11.5px; color:#9ecbff;}
  .f{display:block; background:#0d1119; border:1px solid var(--line); border-radius:5px; padding:10px 12px; margin:8px 0;
     font-family:Georgia,"Times New Roman",serif; font-style:italic; font-size:14.5px; color:#e8e2d0; line-height:1.7; overflow-x:auto;}
  .f b{font-style:normal; font-weight:600;}
  .shp{font-family:var(--mono); font-style:normal; font-size:11px; color:#8fd0a8;}
  .crit{border-left:3px solid var(--loss); background:rgba(255,107,107,.06); padding:9px 12px; border-radius:0 5px 5px 0; margin-top:8px;}
  .crit p{margin-bottom:6px;} .crit p:last-child{margin-bottom:0;}
  .hint{color:var(--dim); font-size:11px; margin-top:16px;}
  .grouplabel{position:absolute; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--dim); z-index:1;}
</style>
</head>
<body>
<div class="topbar">
  <h1>TopologyAdaptiveRoutedUNet3D <span class="tag">// интерактивная схема</span></h1>
  <div class="legend">
    <span><i style="background:var(--enc)"></i>энкодер</span>
    <span><i style="background:var(--dec)"></i>декодер</span>
    <span><i style="background:var(--ctx)"></i>контекст</span>
    <span><i style="background:var(--head)"></i>головы</span>
    <span><i style="background:var(--loss)"></i>лосс</span>
  </div>
  <div class="nsel"><span>размер куба N =</span>
    <button data-n="32">32</button><button data-n="64" class="on">64</button><button data-n="96">96</button><button data-n="128">128</button>
  </div>
</div>
<div class="wrap">
  <div class="canvas-outer"><div class="canvas" id="canvas">
    <svg class="edges" id="edgesvg"></svg>
  </div></div>
  <div class="panel" id="panel"></div>
</div>
<script>
const N0 = 64;
let N = N0;
// ── узлы ────────────────────────────────────────────────────────────────────
const c3 = n => `${n}³`;
const NODES = [
 {id:'input', x:40,  y:28,  g:'io',  nm:'Вход x (КТ-куб)', sh:n=>`[B,1,${c3(n)}] + pad до кратн. 8`},
 {id:'enc1',  x:40,  y:150, g:'enc', nm:'enc1 · ResBlock 1→32', sh:n=>`[B,32,${c3(n)}]`},
 {id:'enc2',  x:40,  y:290, g:'enc', nm:'enc2 · ResBlock 32→64', sh:n=>`MaxPool/2 → [B,64,${c3(n/2)}]`},
 {id:'enc3',  x:40,  y:430, g:'enc', nm:'enc3 · ResBlock 64→128', sh:n=>`MaxPool/2 → [B,128,${c3(n/4)}]`},
 {id:'bott',  x:40,  y:570, g:'enc', nm:'bottleneck · 128→256 + SE', sh:n=>`MaxPool/2 → [B,256,${c3(n/8)}]`},
 {id:'gate1', x:285, y:150, g:'dec', nm:'gate1 · AttentionGate', sh:n=>`e1⊙α → [B,32,${c3(n)}]`},
 {id:'gate2', x:285, y:290, g:'dec', nm:'gate2 · AttentionGate', sh:n=>`e2⊙α → [B,64,${c3(n/2)}]`},
 {id:'gate3', x:285, y:430, g:'dec', nm:'gate3 · AttentionGate', sh:n=>`e3⊙α → [B,128,${c3(n/4)}]`},
 {id:'adagn0',x:330, y:570, g:'ctx', nm:'AdaGN₀', sh:n=>`z₀∈ℝ⁶⁴ → [B,256,${c3(n/8)}]`},
 {id:'up1',   x:475, y:150, g:'dec', nm:'up1 · trilinear + 1×1×1', sh:n=>`64→32, → [B,32,${c3(n)}]`},
 {id:'up2',   x:475, y:290, g:'dec', nm:'up2 · trilinear + 1×1×1', sh:n=>`128→64, → [B,64,${c3(n/2)}]`},
 {id:'up3',   x:475, y:430, g:'dec', nm:'up3 · trilinear + 1×1×1', sh:n=>`256→128, → [B,128,${c3(n/4)}]`},
 {id:'dec1',  x:655, y:150, g:'dec', nm:'dec1 · ResBlock 64→32', sh:n=>`concat → [B,32,${c3(n)}]`},
 {id:'dec2',  x:655, y:290, g:'dec', nm:'dec2 · ResBlock 128→64', sh:n=>`concat → [B,64,${c3(n/2)}]`},
 {id:'dec3',  x:655, y:430, g:'dec', nm:'dec3 · ResBlock 256→128', sh:n=>`concat → [B,128,${c3(n/4)}]`},
 {id:'adagn3',x:865, y:150, g:'ctx', nm:'AdaGN₃', sh:n=>`z₃∈ℝ⁶⁴ → [B,32,${c3(n)}]`},
 {id:'adagn2',x:865, y:290, g:'ctx', nm:'AdaGN₂', sh:n=>`z₂∈ℝ⁶⁴ → [B,64,${c3(n/2)}]`},
 {id:'adagn1',x:865, y:430, g:'ctx', nm:'AdaGN₁', sh:n=>`z₁∈ℝ⁶⁴ → [B,128,${c3(n/4)}]`},
 {id:'outconv',x:630,y:28,  g:'dec', nm:'out_conv · 1×1×1, 32→1', sh:n=>`+ unpad → [B,1,${c3(n)}]`},
 {id:'logits',x:815, y:28,  g:'io',  nm:'logits → σ → P(пора)', sh:n=>`[B,1,${c3(n)}]`},
 {id:'ph',    x:1035, y:28,  g:'ctx', nm:'PH-фичи (gudhi, raw)', sh:()=>`≤32³ → [B,6]`},
 {id:'tokens',x:1035, y:170, g:'ctx', nm:'MultiScaleContext3D', sh:()=>`7 токенов → [B,7,64]`},
 {id:'router',x:1035, y:300, g:'ctx', nm:'DynamicContextRouter', sh:()=>`attn-pool+MLP → α [B,4,7]`},
 {id:'mixed', x:1035, y:430, g:'ctx', nm:'mixed = α·T', sh:()=>`[B,4,64] → 4 уровня AdaGN`},
 {id:'rockemb',x:40, y:700, g:'head',nm:'rock_embedding', sh:()=>`GAP→Lin→LN→GELU → [B,128]`},
 {id:'porohead',x:290,y:668,g:'head',nm:'porosity_head', sh:()=>`Linear 128→1`},
 {id:'perchead',x:290,y:732,g:'head',nm:'percolation_head', sh:()=>`Linear 128→3 (z,y,x)`},
 {id:'topohead',x:490,y:700,g:'head',nm:'topology_head', sh:()=>`Linear 128→6 (PH маски)`},
 {id:'gt',    x:700, y:700, g:'io',  nm:'Маска GT (поры)', sh:n=>`[B,1,${c3(n)}]`},
 {id:'laux',  x:160, y:850, g:'loss',nm:'L_aux · MSE + BCE', sh:()=>`вес 0.05`},
 {id:'ltopo', x:390, y:850, g:'loss',nm:'L_topo · SmoothL1(log1p)', sh:()=>`вес 0.01`},
 {id:'lseg',  x:640, y:850, g:'loss',nm:'L_seg · 0.5·BCE + 0.5·Dice', sh:()=>`вес 1.0`},
 {id:'lcl',   x:850, y:850, g:'loss',nm:'L_clDice · soft-skeleton', sh:()=>`вес 0.3`},
 {id:'ltotal',x:1040,y:760, g:'loss',nm:'L · полный лосс', sh:()=>`Σ взвешенных слагаемых`},
];
// ── рёбра: [from, to, group] ────────────────────────────────────────────────
const EDGES = [
 ['input','enc1','enc'],['enc1','enc2','enc'],['enc2','enc3','enc'],['enc3','bott','enc'],
 ['enc1','gate1','enc'],['enc2','gate2','enc'],['enc3','gate3','enc'],
 ['bott','adagn0','dec'],['adagn0','up3','dec'],
 ['up3','gate3','dec'],['gate3','dec3','dec'],['up3','dec3','dec'],['dec3','adagn1','dec'],
 ['adagn1','up2','dec'],['up2','gate2','dec'],['gate2','dec2','dec'],['up2','dec2','dec'],['dec2','adagn2','dec'],
 ['adagn2','up1','dec'],['up1','gate1','dec'],['gate1','dec1','dec'],['up1','dec1','dec'],['dec1','adagn3','dec'],
 ['adagn3','outconv','dec'],['outconv','logits','dec'],
 ['input','tokens','ctx'],['enc1','tokens','ctx'],['enc2','tokens','ctx'],['enc3','tokens','ctx'],['bott','tokens','ctx'],
 ['ph','tokens','ctx'],['tokens','router','ctx'],['router','mixed','ctx'],
 ['mixed','adagn0','ctx'],['mixed','adagn1','ctx'],['mixed','adagn2','ctx'],['mixed','adagn3','ctx'],
 ['bott','rockemb','head'],['rockemb','porohead','head'],['rockemb','perchead','head'],['rockemb','topohead','head'],
 ['logits','lseg','loss'],['logits','lcl','loss'],['gt','lseg','loss'],['gt','lcl','loss'],
 ['porohead','laux','loss'],['perchead','laux','loss'],['topohead','ltopo','loss'],
 ['lseg','ltotal','loss'],['lcl','ltotal','loss'],['laux','ltotal','loss'],['ltopo','ltotal','loss'],
];
const GCOLOR = {enc:'#4ea1ff', dec:'#3ddc97', ctx:'#ffb454', head:'#c792ea', loss:'#ff6b6b', io:'#8b95a8'};
// ── контент панели ──────────────────────────────────────────────────────────
const resblockMath = `
<span class="f">F(x) = GN(Conv₃ₓ₃ₓ₃(Drop(GELU(GN(Conv₃ₓ₃ₓ₃(x))))))<br>
y = GELU( skip(x) + F(x) )</span>
<p><code>skip</code> — тождество, если каналы совпадают, иначе 1×1×1-свёртка. GroupNorm вместо BatchNorm, потому что батчи маленькие (3D-кубы), и статистики по батчу шумные:</p>
<span class="f">GN(h) = γ · (h − μ_g) / √(σ²_g + ε) + β &nbsp;&nbsp;<span class="shp">(μ, σ — по группе каналов внутри одного примера)</span></span>
<p>GELU(u) = u·Φ(u), где Φ — CDF нормального распределения: гладкая версия ReLU, не зануляет градиент жёстко.</p>`;

const DETAILS = {
input: n => `
<h3>Что это</h3>
<p>Нормализованный grayscale-куб микро-КТ, один канал (плотность). Перед энкодером <code>pad_to_multiple_3d(x, 8)</code> дополняет каждую сторону до кратности 8 — потому что дальше три MaxPool/2, и размер должен делиться на 2³. После декодера паддинг срезается (<code>unpad_3d</code>).</p>
<h3>Формы</h3>
<p class="shp">[B, 1, ${n}, ${n}, ${n}] → (pad) → кратно 8</p>
<h3>Критика</h3>
<div class="crit"><p>Нормализация должна быть фиксирована по статистикам train-сета, а не per-cube — иначе токен t₁ (min/max/μ/σ входа) в контекстной ветке станет почти константой и потеряет смысл.</p></div>`,

enc1: n => `
<h3>Что делает</h3>
<p>Первый уровень энкодера: два 3×3×3-свёрточных слоя с residual-связью поднимают 1 канал до 32. Работает на полном разрешении — здесь модель видит самые тонкие структуры (стенки пор, узкие горловины 1–3 вокселя).</p>
<h3>Математика</h3>${resblockMath}
<h3>Формы</h3><p class="shp">[B,1,${n}³] → [B,32,${n}³]; рецептивное поле блока ≈ 5³</p>
<h3>Роль в системе</h3>
<p>e1 уходит в три места: дальше вниз (pool→enc2), в skip-связь через gate1, и в контекстную ветку (токен текстуры t₂ + GAP-токен t₃). Это единственный уровень, где считаются градиентные статистики текстуры.</p>`,

enc2: n => `
<h3>Что делает</h3>
<p>То же, что enc1 (см. его математику), но после MaxPool/2: разрешение падает вдвое, каналы удваиваются до 64. Классический трейд-офф U-Net: меньше «где», больше «что».</p>
<h3>Формы</h3><p class="shp">[B,32,${n}³] → pool → [B,32,${n/2}³] → [B,64,${n/2}³]</p>
<p>MaxPool3d(2) берёт максимум по каждому окну 2×2×2 — для порового пространства это «есть ли пора хоть где-то в окне», что сохраняет тонкие связности лучше среднего.</p>`,

enc3: n => `
<h3>Что делает</h3>
<p>Третий уровень: 64→128 каналов на разрешении N/4. Здесь фичи уже описывают целые поры и их кластеры, а не отдельные стенки.</p>
<h3>Формы</h3><p class="shp">[B,64,${n/2}³] → pool → [B,128,${n/4}³]</p>
<p>Математика идентична enc1 (ResBlock3D). GAP от e3 — токен t₅ контекстной ветки.</p>`,

bott: n => `
<h3>Что делает</h3>
<p>Дно U-Net: ResBlock 128→256 с Dropout3d(0.2) + SE-блок. Самое сжатое представление куба — глобальный «образ породы». Отсюда же берётся rock_embedding для всех вспомогательных голов.</p>
<h3>Математика SE (Squeeze-and-Excitation)</h3>
<span class="f">ḡ = GAP(h) ∈ ℝ²⁵⁶ &nbsp;→&nbsp; s = σ(W₂ · GELU(W₁ · ḡ)), &nbsp;W₁: 256→32, W₂: 32→256<br>h′ = h ⊙ s &nbsp;&nbsp;<span class="shp">(поканальное умножение, s ∈ (0,1)²⁵⁶)</span></span>
<p>SE — это канальное внимание: сеть сама решает, какие из 256 признаков важны для <i>данного</i> куба, и приглушает остальные. reduction=8 даёт бутылочное горлышко 32 — регуляризация гейта.</p>
<h3>Формы</h3><p class="shp">[B,128,${n/4}³] → pool → [B,128,${n/8}³] → [B,256,${n/8}³]</p>
<h3>Критика</h3>
<div class="crit"><p>SE дёшев (~16K параметров), но его вклад на бинарной сегментации часто в пределах шума. Первый кандидат в ablation-таблицу.</p></div>`,

gate1: n => gateDetail(n, 1, 32, n), gate2: n => gateDetail(n, 2, 64, n/2), gate3: n => gateDetail(n, 3, 128, n/4),

up1: n => upDetail(64, 32, n), up2: n => upDetail(128, 64, n/2), up3: n => upDetail(256, 128, n/4),

dec1: n => decDetail(1, 32, n), dec2: n => decDetail(2, 64, n/2), dec3: n => decDetail(3, 128, n/4),

adagn0: n => adagnDetail(0, 256, `${n/8}`), adagn1: n => adagnDetail(1, 128, `${n/4}`),
adagn2: n => adagnDetail(2, 64, `${n/2}`), adagn3: n => adagnDetail(3, 32, `${n}`),

outconv: n => `
<h3>Что делает</h3>
<p>Финальная 1×1×1-свёртка: линейная комбинация 32 каналов декодера в один логит на воксель. Затем <code>unpad_3d</code> срезает паддинг до исходного размера.</p>
<span class="f">logit(v) = w·d1(v) + b, &nbsp;w ∈ ℝ³²</span>
<p class="shp">[B,32,${n}³] → [B,1,${n}³]</p>
<p>Никакой сигмоиды внутри модели — она применяется в лоссе (BCEWithLogits, численно стабильнее) и на инференсе.</p>`,

logits: n => `
<h3>Что это</h3>
<p>Сырые логиты. P(воксель — пора) = σ(logit). Порог 0.5 → бинарная маска. На инференсе большие объёмы режутся на кубы с перекрытием и сшиваются.</p>
<h3>Куда уходит</h3>
<p>В L_seg (BCE+Dice) и в L_clDice (через σ → soft-вероятности → мягкая скелетонизация).</p>
<h3>Критика</h3>
<div class="crit"><p>Порог 0.5 не обязан быть оптимальным для топологии: связность может рваться на 0.5 и сохраняться на 0.4. Стоит подбирать порог по clDice/Betti на валидации, а не только по Dice.</p></div>`,

ph: () => `
<h3>Что это</h3>
<p>Персистентная гомология <b>сырого</b> grayscale-куба (не маски — иначе утечка таргета в вход). Куб даунсемплится до ≤32³, нормализуется в [0,1] и используется как lower-star фильтрация кубического комплекса (gudhi, коэффициенты в ℤ₂).</p>
<h3>Математика</h3>
<p>Фильтрация: подмножества X_t = {воксели: значение ≤ t} при росте t от 0 до 1. Рождение/смерть топологических классов даёт интервалы (b, d):</p>
<ul><li><b>H₀</b> — компоненты связности (тёмные «озёра» пор появляются и сливаются)</li>
<li><b>H₁</b> — независимые циклы/туннели</li></ul>
<span class="f">PH = [#H₀, Σ(d−b)|H₀, max(d−b)|H₀, #H₁, Σ(d−b)|H₁, max(d−b)|H₁] ∈ ℝ⁶</span>
<p>Учитываются только конечные интервалы; «время жизни» d−b — устойчивость структуры к порогу.</p>
<h3>Критика</h3>
<div class="crit"><p>32³ — грубо: горловина в 1–2 вокселя на полном разрешении после даунсемпла исчезает, H₁ недосчитывается. И 6 чисел — очень сжатая сводка (нет H₂ — замкнутых полостей). Считать на 64³ дороже, но честнее; минимум — проверить чувствительность.</p></div>`,

tokens: () => `
<h3>Что делает</h3>
<p>Собирает «паспорт образца» — 7 токенов по 64 числа, каждый описывает куб с разной точки зрения. Все источники проецируются линейными слоями в общее пространство ℝ⁶⁴:</p>
<ul>
<li><b>t₁</b> = W_in·[μ, σ, min, max](x) — глобальные статистики входа (4→64)</li>
<li><b>t₂</b> = W_tex·[Σ|∇|, анизотропия](e1) — текстура: средние модули конечных разностей по z,y,x; второе число g_z−g_x ловит направленность (слоистость) (2→64)</li>
<li><b>t₃…t₆</b> = W_k·GAP(e_k) — усреднённые фичи enc1/enc2/enc3/bottleneck (32,64,128,256→64)</li>
<li><b>t₇</b> = W_ph·PH(x) — топологическая сводка (6→64)</li>
</ul>
<span class="f">T = stack(t₁…t₇) ∈ ℝ^{B×7×64}</span>
<h3>Зачем</h3>
<p>Разные породы (песчаник/карбонат/глина) требуют разной «настройки» декодера. Вместо отдельных моделей — один декодер, модулируемый паспортом через router→AdaGN.</p>
<h3>Критика</h3>
<div class="crit"><p>Главный недоказанный блок: вся ветка может выучиться в no-op (AdaGN zero-init это позволяет). Без ablation «with/without context» заявлять её полезность нельзя.</p></div>`,

router: () => `
<h3>Что делает</h3>
<p>Решает, <i>какому уровню декодера какой токен паспорта нужен</i>. Это мягкий mixture-of-experts по источникам контекста.</p>
<h3>Математика</h3>
<span class="f">q ∈ ℝ⁶⁴ — обучаемый query (init N(0, 0.02))<br>
pooled = MultiheadAttention(q, T, T) &nbsp;<span class="shp">— агрегат всех 7 токенов</span><br>
logits = MLP(pooled) ∈ ℝ^{4×7}<br>
α = softmax(logits, по источникам) &nbsp;<span class="shp">— α[l,k] ≥ 0, Σ_k α[l,k] = 1</span></span>
<p>Внимание: Attn(q,T,T) = Σ_k softmax(qK_kᵀ/√d)·V_k — взвешенное среднее токенов, веса зависят от их содержимого.</p>
<h3>Критика</h3>
<div class="crit"><p>Классическая болезнь — <b>коллапс роутера</b>: α перестаёт зависеть от входа (одинаковая на всём батче) или схлопывается в один источник. Диагностика: логируй энтропию H(α[l,·]) и дисперсию α по батчу. Если H→0 или Var→0 — блок мёртв, выкидывай.</p></div>`,

mixed: () => `
<h3>Что это</h3>
<p>Результат маршрутизации: для каждого из 4 уровней декодера — свой вектор контекста.</p>
<span class="f">z_l = Σ_{k=1}^{7} α[l,k] · t_k ∈ ℝ⁶⁴ &nbsp;&nbsp;(l = 0…3) &nbsp;⇒&nbsp; mixed ∈ ℝ^{B×4×64}</span>
<p>Интерпретация — бесплатная диагностика: матрица α (4×7) показывает, что глубокие уровни «смотрят» (по идее) на глобальные токены (PH, bottleneck), а мелкие — на текстуру. Если такой структуры нет — роутер ничего осмысленного не выучил.</p>`,

rockemb: () => `
<h3>Что делает</h3>
<p>Глобальный вектор породы: GAP по объёму bottleneck → Linear 256→128 → LayerNorm → GELU. Одна точка в ℝ¹²⁸ на куб.</p>
<span class="f">r = GELU(LN(W · GAP(bottleneck))) ∈ ℝ¹²⁸</span>
<h3>Зачем</h3>
<p>Общий «ствол» для трёх вспомогательных голов (пористость, перколяция, топология). Aux-задачи заставляют bottleneck кодировать физически осмысленные свойства, а не только локальные текстуры. Бонус: r можно использовать как эмбеддинг породы для кластеризации/retrieval.</p>`,

porohead: () => `
<h3>Что делает</h3>
<p>Предсказывает пористость куба: φ̂ = σ(Linear(r)). Таргет — доля пор в GT-маске: φ = mean(y).</p>
<span class="f">L_poro = MSE(σ(ŷ), φ), &nbsp;вес 0.05</span>
<p>Сигмоида гарантирует φ̂ ∈ (0,1). Самая лёгкая aux-задача — фактически калибровка глобального баланса классов.</p>`,

perchead: () => `
<h3>Что делает</h3>
<p>Три логита: перколирует ли поровое пространство куба вдоль осей z, y, x (есть ли связный путь от грани до противоположной грани). Таргет считается по GT-маске (connected components от грани до грани).</p>
<span class="f">L_perc = BCEWithLogits(ŷ ∈ ℝ³, y ∈ {0,1}³), &nbsp;вес 0.05</span>
<h3>Зачем</h3>
<p>Перколяция — самое грубое, но самое важное топологическое свойство для проницаемости: непроводящий образец имеет k=0 независимо от пористости. Это «дешёвая физика» в лоссе.</p>`,

topohead: () => `
<h3>Что делает</h3>
<p>Предсказывает 6 PH-статистик <b>GT-маски</b> (целевую топологию) из rock_embedding. Заметь асимметрию: на <i>вход</i> идёт PH сырого скана, а голова предсказывает PH <i>маски</i> — утечки нет.</p>
<span class="f">L_topo = SmoothL1(ŷ, log1p(PH(y))), &nbsp;вес 0.01</span>
<p>log1p — потому что счётчики компонент (#H₀) бывают в сотни раз больше «времён жизни»; без компрессии они задавили бы градиент. SmoothL1 устойчив к выбросам PH.</p>
<h3>Критика</h3>
<div class="crit"><p>Вес 0.01 — это почти ничего: голова скорее «зонд» (можно ли из r прочитать топологию), чем реальный обучающий сигнал. Честную работу за топологию делает clDice.</p></div>`,

gt: n => `
<h3>Что это</h3>
<p>Бинарная маска порового пространства [B,1,${n}³]: 1 — пора, 0 — скелет породы. Источник всех таргетов: воксельных (L_seg, L_clDice) и глобальных (φ, перколяция, PH маски).</p>
<div class="crit"><p>Качество GT — потолок всей системы. Если маски получены пороговой сегментацией с артефактами, модель выучит эти артефакты с любым лоссом. Стоит хотя бы выборочно проверить GT на физическую состоятельность (connected porosity vs полная).</p></div>`,

lseg: () => `
<h3>Основной воксельный лосс</h3>
<span class="f">L_seg = 0.5·BCE + 0.5·L_Dice<br>
BCE = −mean[ y·log σ(ŷ) + (1−y)·log(1−σ(ŷ)) ]<br>
L_Dice = 1 − (2·Σ p·y + ε) / (Σ p + Σ y + ε), &nbsp;p = σ(ŷ)</span>
<p>BCE даёт плотный воксельный градиент (каждый воксель учится независимо), Dice — глобальное перекрытие, устойчивое к дисбалансу классов (пористость часто 10–25%, фон доминирует). Вместе — стандартная рабочая лошадка.</p>
<div class="crit"><p>Оба лосса слепы к топологии: разрыв горловины в 2 вокселя почти не меняет Dice, но меняет связность (и любую последующую гидродинамику) радикально. Поэтому рядом стоит clDice.</p></div>`,

lcl: () => `
<h3>clDice — лосс на связность (Shit et al., CVPR 2021)</h3>
<p>Идея: сравнивать не объёмы, а <b>скелеты</b>. Мягкая скелетонизация — дифференцируемая морфология на min/max-пулингах:</p>
<span class="f">erode(I) = min по 3 направленным ядрам (−maxpool(−I))<br>
open(I) = dilate(erode(I)); &nbsp; skel += ReLU(I_k − open(I_k)) на каждой итерации эрозии</span>
<p>Дальше топологические precision/sensitivity и их F1:</p>
<span class="f">Tprec = |S_p ⊙ y| / |S_p|, &nbsp; Tsens = |S_y ⊙ p| / |S_y|<br>
L_clDice = 1 − 2·Tprec·Tsens / (Tprec + Tsens), &nbsp;вес 0.3</span>
<p>Tsens наказывает именно разрывы: если скелет GT проходит там, где предсказание пусто — штраф, даже если по объёму ошибка ничтожна.</p>
<div class="crit"><p>Память: каждая итерация скелетонизации хранит активации → на 8 GB GPU нужен gradient checkpointing по итерациям + опция downsample (уже встроено в SoftClDiceLoss). num_iters должен покрывать максимальный радиус пор, иначе толстые поры не доскелетонизируются.</p></div>`,

laux: () => `
<h3>Вспомогательный физический лосс</h3>
<span class="f">L_aux = 0.05·MSE(σ(φ̂), φ) + 0.05·BCE(перколяция)</span>
<p>Малые веса — осознанно: aux-задачи должны <i>формировать представление</i> (заставлять bottleneck кодировать глобальную физику), а не конкурировать с сегментацией. Типичный паттерн multi-task learning: главная задача ~1.0, регуляризующие — 0.01–0.1.</p>`,

ltopo: () => `
<h3>Лосс топологической головы</h3>
<span class="f">L_topo = 0.01 · SmoothL1(topo_pred, log1p(PH(маска)))</span>
<p>SmoothL1: квадратичен около нуля, линеен на хвостах — выбросы PH-статистик (аномальные кубы с сотнями компонент) не взрывают градиент.</p>`,

ltotal: () => `
<h3>Полный лосс</h3>
<span class="f"><b>L = L_seg + 0.3·L_clDice + 0.05·(L_poro + L_perc) + 0.01·L_topo</b></span>
<p>Иерархия по убыванию: воксельная точность → связность скелета → глобальная физика → топологическая сводка. Топология сидит в <b>лоссе</b>, а не во входе — это ключевое архитектурное решение (вход PH сырого скана не циркулярен, а clDice напрямую оптимизирует то, что ломает даунстрим-гидродинамику).</p>
<h3>Критика / план проверки</h3>
<div class="crit">
<p>1. Веса 0.3/0.05/0.01 не подбирались — минимум sweep по cldice-weight {0.1, 0.3, 0.5}.</p>
<p>2. Обязательная ablation-таблица: base U-Net → +SE → +gates → +context/router → +AdaGN → +clDice → +aux. Метрики: Dice, clDice, Betti-error (b₀,b₁), connected porosity. Без неё каждый блок — недоказанная гипотеза.</p>
<p>3. Валидация leave-one-rock-out, иначе метрики меряют запоминание породы, а не обобщение.</p></div>`,
};
// шаблоны для повторяющихся блоков
function gateDetail(n, k, ch, res){ return `
<h3>Что делает</h3>
<p>Attention-гейт на skip-связи уровня ${k}: решает, <i>какие места</i> карты энкодера e${k} пропустить в декодер. Сигнал-гейт g — апсемпленная карта декодера (что модель уже «знает» о крупной структуре), она подсвечивает релевантные зоны мелких фич.</p>
<h3>Математика</h3>
<span class="f">α(v) = σ( ψ( GELU( W_f·f(v) + W_g·g(v) ) ) ) ∈ (0,1)<br>
out = f ⊙ α &nbsp;&nbsp;<span class="shp">(поэлементно, α — скалярная карта)</span></span>
<p>W_f: ${ch}→${Math.max(ch/2,1)}, W_g: ${ch}→${Math.max(ch/2,1)}, ψ: ${Math.max(ch/2,1)}→1 — все 1×1×1-свёртки. Это аддитивное внимание (Attention U-Net, Oktay et al. 2018): сложение f и g в скрытом пространстве, затем скалярный «вес важности» на каждый воксель.</p>
<h3>Формы</h3><p class="shp">f = e${k}: [B,${ch},${res}³], g = up: [B,${ch},${res}³] → out: [B,${ch},${res}³]</p>
<h3>Критика</h3>
<div class="crit"><p>На бинарной задаче с однородным фоном гейты часто выучивают α≈1 везде (no-op за лишние FLOPs). Проверка: визуализируй карты α — если они неинформативны, в ablation блок уйдёт.</p></div>`; }

function upDetail(cin, cout, res){ return `
<h3>Что делает</h3>
<p>Подъём разрешения в 2 раза: трилинейная интерполяция до размера соответствующего скипа + 1×1×1-свёртка ${cin}→${cout} для согласования каналов.</p>
<span class="f">up(h) = Conv₁ₓ₁ₓ₁( interp_trilinear(h, target) )</span>
<h3>Почему не transposed conv</h3>
<p>ConvTranspose3d с stride 2 даёт шахматные артефакты (checkerboard): соседние воксели получают неравное число вкладов ядра. Интерполяция+свёртка — гладкая и предсказуемая, артефактов нет. Интерполяция до <i>точного</i> размера скипа также снимает проблемы с нечётными размерами.</p>
<h3>Формы</h3><p class="shp">[B,${cin},${res/2}³] → interp → [B,${cin},${res}³] → [B,${cout},${res}³]</p>`; }

function decDetail(k, ch, res){ return `
<h3>Что делает</h3>
<p>Уровень декодера ${k}: конкатенация апсемпла (крупный контекст) и гейтованного скипа (точная локализация), затем ResBlock ${ch*2}→${ch} сплавляет их в одну карту.</p>
<span class="f">d${k} = ResBlock( concat[ up, e${k} ⊙ α ] )</span>
<p>Конкатенация (а не сумма) позволяет блоку самому выучить, как смешивать два источника — сумма навязала бы равные веса с порога. Математика ResBlock — как в enc1.</p>
<h3>Формы</h3><p class="shp">[B,${ch}+${ch},${res}³] → [B,${ch},${res}³]</p>`; }

function adagnDetail(l, ch, res){ return `
<h3>Что делает</h3>
<p>Adaptive GroupNorm уровня ${l}: контекстный вектор z_${l} ∈ ℝ⁶⁴ (выход роутера) перенастраивает нормализацию карты декодера — глобальный «паспорт породы» модулирует локальные вычисления.</p>
<h3>Математика</h3>
<span class="f">[s, b] = W·z_${l} ∈ ℝ^{2·${ch}} &nbsp;&nbsp;<span class="shp">(W и bias инициализированы нулями)</span><br>
ĥ = GN₀(h) · (1 + s) + b &nbsp;&nbsp;<span class="shp">(GN₀ — GroupNorm без affine; s,b — на канал)</span></span>
<p>Тот же механизм, что conditioning в диффузионных моделях (FiLM/AdaGN). <b>Zero-init</b> — ключ: на старте s=b=0 ⇒ ĥ=GN₀(h), блок — тождество. Контекст «включается» постепенно и только если уменьшает лосс. Это страховка от деградации, но и лазейка для no-op.</p>
<h3>Формы</h3><p class="shp">h: [B,${ch},${res}³], z: [B,64] → ĥ: [B,${ch},${res}³]</p>
<h3>Диагностика</h3>
<div class="crit"><p>После обучения проверь ‖W‖ и фактический масштаб s: если s≈0 на всех уровнях — контекстная ветка не используется, выбрасывай её целиком (−роутер, −токены).</p></div>`; }
// ── рендер ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const svg = document.getElementById('edgesvg');
const panel = document.getElementById('panel');
const nodeEls = {};

NODES.forEach(nd => {
  const el = document.createElement('div');
  el.className = 'node g-' + nd.g;
  el.style.left = nd.x + 'px';
  el.style.top = nd.y + 'px';
  el.innerHTML = `<div class="nm">${nd.nm}</div><div class="sh"></div>`;
  el.addEventListener('click', () => select(nd.id));
  canvas.appendChild(el);
  nodeEls[nd.id] = el;
});

function anchor(el, side){
  const x = el.offsetLeft, y = el.offsetTop, w = el.offsetWidth, h = el.offsetHeight;
  if (side === 'l') return [x, y + h/2];
  if (side === 'r') return [x + w, y + h/2];
  if (side === 't') return [x + w/2, y];
  return [x + w/2, y + h];
}
function edgePath(a, b){
  const ea = nodeEls[a], eb = nodeEls[b];
  const ax = ea.offsetLeft + ea.offsetWidth/2, ay = ea.offsetTop + ea.offsetHeight/2;
  const bx = eb.offsetLeft + eb.offsetWidth/2, by = eb.offsetTop + eb.offsetHeight/2;
  const dx = bx - ax, dy = by - ay;
  let p1, p2;
  if (Math.abs(dx) > Math.abs(dy)) { p1 = anchor(ea, dx > 0 ? 'r' : 'l'); p2 = anchor(eb, dx > 0 ? 'l' : 'r');
    const mx = (p1[0] + p2[0]) / 2;
    return `M ${p1[0]} ${p1[1]} C ${mx} ${p1[1]}, ${mx} ${p2[1]}, ${p2[0]} ${p2[1]}`;
  } else { p1 = anchor(ea, dy > 0 ? 'b' : 't'); p2 = anchor(eb, dy > 0 ? 't' : 'b');
    const my = (p1[1] + p2[1]) / 2;
    return `M ${p1[0]} ${p1[1]} C ${p1[0]} ${my}, ${p2[0]} ${my}, ${p2[0]} ${p2[1]}`;
  }
}
const edgeEls = [];
function drawEdges(){
  svg.innerHTML = '';
  edgeEls.length = 0;
  EDGES.forEach(([a, b, g]) => {
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', edgePath(a, b));
    p.setAttribute('stroke', GCOLOR[g]);
    svg.appendChild(p);
    edgeEls.push({p, a, b});
  });
}
function refreshShapes(){
  NODES.forEach(nd => { nodeEls[nd.id].querySelector('.sh').textContent = nd.sh(N); });
  drawEdges();
}

let selected = null;
function select(id){
  selected = id;
  const nd = NODES.find(n => n.id === id);
  const neigh = new Set([id]);
  EDGES.forEach(([a, b]) => { if (a === id) neigh.add(b); if (b === id) neigh.add(a); });
  NODES.forEach(n => {
    nodeEls[n.id].classList.toggle('sel', n.id === id);
    nodeEls[n.id].classList.toggle('dm', !neigh.has(n.id));
  });
  edgeEls.forEach(e => {
    const hl = (e.a === id || e.b === id);
    e.p.classList.toggle('hl', hl);
    e.p.classList.toggle('dm', !hl);
  });
  panel.innerHTML = `<h2>${nd.nm}</h2><div class="cls">${CLSNAME[id] || ''}</div>` +
    (DETAILS[id] ? DETAILS[id](N) : '<p>—</p>') +
    `<div class="hint">Кликни по другому блоку схемы. N меняется кнопками сверху — формы тензоров пересчитаются.</div>`;
  panel.scrollTop = 0;
}
const CLSNAME = {
  input:'тензор · вход forward()', enc1:'ResBlock3D', enc2:'ResBlock3D', enc3:'ResBlock3D',
  bott:'nn.Sequential(ResBlock3D, SEBlock3D)', gate1:'AttentionGate3D', gate2:'AttentionGate3D', gate3:'AttentionGate3D',
  up1:'TrilinearUpsampleConv3D', up2:'TrilinearUpsampleConv3D', up3:'TrilinearUpsampleConv3D',
  dec1:'ResBlock3D', dec2:'ResBlock3D', dec3:'ResBlock3D',
  adagn0:'AdaGN3D (adapters[0])', adagn1:'AdaGN3D (adapters[1])', adagn2:'AdaGN3D (adapters[2])', adagn3:'AdaGN3D (adapters[3])',
  outconv:'nn.Conv3d(32, 1, 1)', logits:'output["logits"]',
  ph:'topology.cubical_persistence_summary', tokens:'MultiScaleContext3D', router:'DynamicContextRouter', mixed:'router → mixed',
  rockemb:'rock_embedding_head', porohead:'porosity_head', perchead:'percolation_head', topohead:'topology_head',
  gt:'таргет · бинарная маска', lseg:'BCEDiceLoss', lcl:'SoftClDiceLoss', laux:'auxiliary_physics_loss',
  ltopo:'topology_prediction_loss', ltotal:'train.py: seg + 0.3·clDice + aux + topo',
};

document.querySelectorAll('.nsel button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nsel button').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    N = parseInt(btn.dataset.n, 10);
    refreshShapes();
    if (selected) select(selected);
  });
});
